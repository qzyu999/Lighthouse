title: Data Catalog
subtitle: Available databases and tables in the sample datalake
sections:
  - heading: Overview
    content: |
      This catalog describes the sample tables available for querying.
      The datalake follows a medallion architecture: bronze → silver → gold.

  - heading: Databases
    catalog:
      - database: sample_analytics
        table: events
        layer: gold
        format: parquet
        pipeline: batch ETL
        frequency: daily
      - database: sample_analytics
        table: users
        layer: gold
        format: parquet
        pipeline: batch ETL
        frequency: daily
      - database: sample_analytics
        table: orders
        layer: gold
        format: parquet
        pipeline: streaming
        frequency: real-time
      - database: sample_analytics
        table: products
        layer: silver
        format: parquet
        pipeline: batch ETL
        frequency: weekly

  - heading: Table Details
    content: |
      **events** — User interaction events (page views, clicks, purchases)
      Columns: event_id, user_id, event_type, timestamp, metadata

      **users** — User profiles and attributes
      Columns: user_id, name, email, signup_date, tier, region

      **orders** — Purchase transactions
      Columns: order_id, user_id, product_id, quantity, total, order_date, status

      **products** — Product catalog
      Columns: product_id, name, category, price, stock_count, supplier
