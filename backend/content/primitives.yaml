title: Data Primitives
subtitle: Business rules and schema contracts for the sample datalake
sections:
  - heading: Overview
    content: |
      These primitives define the operational rules governing the sample analytics tables.
      Use them when generating SQL or validating data quality.

  - primitive:
      name: User Events
      database: sample_analytics
      source_table: events
      publish_target: events_gold
      fields:
        - name: event_id
          type: varchar
          description: Unique event identifier (UUID)
        - name: user_id
          type: varchar
          description: Foreign key to users table
        - name: event_type
          type: varchar
          description: "One of: page_view, click, purchase, signup, logout"
        - name: timestamp
          type: timestamp
          description: When the event occurred (UTC)
        - name: metadata
          type: json
          description: Event-specific payload (varies by event_type)
      business_rules:
        - Events older than 90 days are archived to cold storage
        - Duplicate event_ids within a 5-minute window are deduplicated
        - Anonymous events (null user_id) are excluded from user-level aggregations

  - primitive:
      name: Orders
      database: sample_analytics
      source_table: orders
      publish_target: orders_gold
      fields:
        - name: order_id
          type: varchar
          description: Unique order identifier
        - name: user_id
          type: varchar
          description: Foreign key to users table
        - name: product_id
          type: varchar
          description: Foreign key to products table
        - name: quantity
          type: integer
          description: Number of items ordered
        - name: total
          type: decimal
          description: Order total in USD
        - name: order_date
          type: date
          description: Date the order was placed
        - name: status
          type: varchar
          description: "One of: pending, confirmed, shipped, delivered, cancelled"
      business_rules:
        - Cancelled orders are excluded from revenue calculations
        - Orders with status=pending for >7 days are flagged for review
        - Refunded orders retain original total but get status=cancelled
